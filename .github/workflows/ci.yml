name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  USER_EMAIL: ${{ secrets.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  BROWSER: chromium
  HEADLESS: "true"
  TIMEOUT: "30000"
  LOG_LEVEL: info

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playwright/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          if-no-files-found: ignore

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restAssured
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - run: mvn --batch-mode test "-Dtest=LoginTest,BusBookingApiTest"
      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: restAssured/target/surefire-reports/
          if-no-files-found: ignore

  db-tests:
    name: Database tests
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    defaults:
      run:
        working-directory: restAssured
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - run: docker info
      - run: mvn --batch-mode test "-Dtest=BusBookingDbTest"
      - name: Upload DB reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-test-reports
          path: restAssured/target/surefire-reports/
          if-no-files-found: ignore

  security-tests:
    name: BOLA test and OWASP ZAP scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restAssured
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - name: Run BOLA authorization test
        run: mvn --batch-mode test "-Dtest=SecurityBolaTest"
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.BASE_URL }}
          cmd_options: "-a -j"
          allow_failure: false
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore
